{% extends "layouts/base.html" %}
{% block title %}Upload Dataset{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <h1 class="text-xl font-medium mb-6">Upload a dataset</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="bg-white border border-gray-200 rounded-xl p-6 space-y-5">
      <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center">
        <div class="text-4xl mb-2">📂</div>
        <p class="text-sm text-gray-600">Drag & drop your CSV or Excel file here</p>
        <label class="mt-3 inline-block cursor-pointer text-sm text-indigo-600 font-medium">
          Browse files <input type="file" name="file" accept=".csv,.xlsx,.xls" class="hidden">
        </label>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Dataset name</label>
        <input type="text" name="name" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea name="description" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
      </div>
      <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-indigo-700">Upload & Analyse</button>
    </div>
  </form>
</div>
{% endblock %}
