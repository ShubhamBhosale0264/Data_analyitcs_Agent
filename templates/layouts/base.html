<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Analytics Platform{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org/dist/ext/ws.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  {% include "components/navbar.html" %}
  {% if messages %}
  <div class="max-w-7xl mx-auto px-4 mt-4">
    {% for msg in messages %}
    <div class="p-3 mb-2 rounded text-sm
      {% if msg.tags == 'error' %}bg-red-100 text-red-800
      {% elif msg.tags == 'success' %}bg-green-100 text-green-800
      {% else %}bg-blue-100 text-blue-800{% endif %}">{{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}
  <main class="max-w-7xl mx-auto px-4 py-8">{% block content %}{% endblock %}</main>
  <script>
    document.body.addEventListener('htmx:configRequest', function(evt) {
      evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
