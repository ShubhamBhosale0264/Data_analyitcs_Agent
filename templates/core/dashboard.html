{% extends "layouts/base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="mb-8">
  <h1 class="text-2xl font-medium">Welcome back, {{ user.first_name|default:user.email }}</h1>
</div>
<div class="grid grid-cols-3 gap-4 mb-10">
  <a href="{% url 'datasets:upload' %}" class="bg-white border border-gray-200 rounded-xl p-5 hover:border-indigo-300 transition">
    <div class="text-2xl mb-2">📁</div>
    <div class="font-medium">Upload dataset</div>
    <div class="text-xs text-gray-500 mt-1">CSV or Excel file</div>
  </a>
  <a href="{% url 'datasets:list' %}" class="bg-white border border-gray-200 rounded-xl p-5 hover:border-indigo-300 transition">
    <div class="text-2xl mb-2">🔍</div>
    <div class="font-medium">Browse datasets</div>
    <div class="text-xs text-gray-500 mt-1">View all your data</div>
  </a>
  <a href="#" class="bg-white border border-gray-200 rounded-xl p-5 hover:border-indigo-300 transition">
    <div class="text-2xl mb-2">📊</div>
    <div class="font-medium">My dashboards</div>
    <div class="text-xs text-gray-500 mt-1">Saved charts & reports</div>
  </a>
</div>
{% endblock %}
